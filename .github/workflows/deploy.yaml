name: Deploy to EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::686458136675:role/github-oidc-role 
        aws-region: ap-northeast-1

    - name: Login ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Image
      run: |
        docker build -t example-voting-app .

    - name: Tag Image
      run: |
        docker tag example-voting-app:latest \
        686458136675.dkr.ecr.ap-northeast-1.amazonaws.com/example-voting-app:${{ github.sha }}

    - name: Push Image
      run: |
        docker push \
        686458136675.dkr.ecr.ap-northeast-1.amazonaws.com/example-voting-app:${{ github.sha }}
