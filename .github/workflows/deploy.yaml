name: Build and Deploy Vote Service

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  AWS_ACCOUNT_ID: "686458136675"
  ECR_REPOSITORY: example-voting-app
  EKS_CLUSTER_NAME: eks-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Debug GitHub Context
        run: |
          echo "Repository = ${{ github.repository }}"
          echo "Ref = ${{ github.ref }}"
          echo "Actor = ${{ github.actor }}"  

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::686458136675:role/github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} ./vote

      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:${{ github.sha }} \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

      # - name: Configure kubectl
      #   run: |
      #     aws eks update-kubeconfig \
      #       --name $EKS_CLUSTER_NAME \
      #       --region $AWS_REGION

      # - name: Update Kubernetes Deployment
      #   run: |
      #     kubectl set image deployment/vote \
      #     vote=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

      # - name: Verify Deployment
      #   run: |
      #     kubectl rollout status deployment/vote
